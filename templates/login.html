<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8",
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Login | LuminaTech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-panel" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 2rem; margin-bottom: 0.5rem;">⚡</div>
            <h2 style="font-weight: 800;">Internal Portal</h2>
            <p style="font-size: 0.8rem; color: var(--text-secondary);">Enterprise SSO / Legacy Auth</p>
        </div>

        {% if error %}
        <div style="background: rgba(248, 81, 73, 0.1); color: var(--danger); padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; border: 1px solid var(--danger); font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Employee ID / Username</label>
                <input type="text" name="username" placeholder="e.g. j.doe" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" style="width: 100%; margin-top: 1rem;">Authorize Access</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: var(--text-secondary);">
            <a href="#" style="color: var(--accent-color);">Forgot password?</a> | <a href="#" style="color: var(--accent-color);">Request Access</a>
        </div>
    </div>
</body>
</html>
